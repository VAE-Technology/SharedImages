<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Outer rounded square -->
  <rect x="20" y="20" width="160" height="160" rx="20" ry="20" fill="none" stroke="black" stroke-width="2"></rect>

  <!-- Left angled slot -->
  <rect x="63" y="65" width="14" height="40" rx="3" transform="rotate(-30 70 85)" fill="none" stroke="black" stroke-width="2"></rect>

  <!-- Right angled slot -->
  <rect x="123" y="65" width="14" height="40" rx="3" transform="rotate(30 130 85)" fill="none" stroke="black" stroke-width="2"></rect>

  <!-- Earth slot -->
  <rect x="93" y="110" width="14" height="34" rx="3" fill="none" stroke="black" stroke-width="2"></rect>
</svg>